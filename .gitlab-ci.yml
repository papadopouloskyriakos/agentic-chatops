# Claude Gateway CI/CD Pipeline
# Automated MR review via Claude Code + workflow validation + GitHub sync

image: python:3.12-slim

stages:
  - validate
  - test
  - review
  - sync

variables:
  GIT_DEPTH: 0

# ─── Validate: n8n workflow JSON syntax ───
validate_workflows:
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - workflows/*.json
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - workflows/*.json
  script:
    - echo "Validating workflow JSON files..."
    - |
      ERRORS=0
      for f in workflows/*.json; do
        if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
          echo "INVALID JSON: $f"
          ERRORS=$((ERRORS + 1))
        else
          NODES=$(python3 -c "import json; print(len(json.load(open('$f')).get('nodes', [])))")
          echo "OK: $f ($NODES nodes)"
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "FAILED: $ERRORS invalid workflow files"
        exit 1
      fi
      echo "All workflow files valid"
  tags:
    - docker

# ─── Validate: shell script syntax ───
validate_scripts:
  stage: validate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - openclaw/skills/**/*.sh
        - scripts/*.sh
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"'
      changes:
        - openclaw/skills/**/*.sh
        - scripts/*.sh
  script:
    - echo "Checking shell script syntax..."
    - |
      ERRORS=0
      for f in $(find openclaw/skills scripts -name '*.sh' -type f 2>/dev/null); do
        if ! bash -n "$f" 2>/dev/null; then
          echo "SYNTAX ERROR: $f"
          ERRORS=$((ERRORS + 1))
        else
          echo "OK: $f"
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "FAILED: $ERRORS scripts with syntax errors"
        exit 1
      fi
      echo "All scripts valid"
  tags:
    - docker

# ─── Test: golden test suite (offline subset) ───
test-golden-offline:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - openclaw/skills/**/*.sh
        - openclaw/SOUL.md
        - scripts/*.sh
        - scripts/*.py
        - workflows/*.json
        - a2a/**/*
  script:
    - echo "Running offline golden tests (syntax + JSON + guardrails + agent cards)..."
    - bash scripts/golden-test-suite.sh --offline
  tags:
    - docker

# ─── Test: triage script syntax + shellcheck ───
test-triage-syntax:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Running bash -n syntax check on all triage scripts..."
    - |
      ERRORS=0
      for f in $(find openclaw/skills -name '*.sh' -type f 2>/dev/null) \
               $(find scripts -name '*.sh' -type f 2>/dev/null) \
               test-e2e-infra-triage.sh; do
        if [ ! -f "$f" ]; then continue; fi
        if ! bash -n "$f" 2>&1; then
          echo "SYNTAX ERROR: $f"
          ERRORS=$((ERRORS + 1))
        else
          echo "OK: $f"
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "FAILED: $ERRORS scripts with syntax errors"
        exit 1
      fi
      echo "All triage scripts pass bash -n"
    - echo "Running shellcheck (if available)..."
    - |
      if command -v shellcheck >/dev/null 2>&1; then
        SC_ERRORS=0
        for f in openclaw/skills/infra-triage/infra-triage.sh \
                 openclaw/skills/k8s-triage/k8s-triage.sh \
                 openclaw/skills/correlated-triage/correlated-triage.sh \
                 openclaw/skills/site-config.sh \
                 scripts/maintenance-companion.sh \
                 test-e2e-infra-triage.sh; do
          if [ ! -f "$f" ]; then continue; fi
          echo "shellcheck: $f"
          if ! shellcheck -S warning -e SC1090,SC1091,SC2029,SC2086,SC2155 "$f"; then
            SC_ERRORS=$((SC_ERRORS + 1))
          fi
        done
        if [ $SC_ERRORS -gt 0 ]; then
          echo "WARNING: $SC_ERRORS scripts have shellcheck warnings"
        else
          echo "All scripts pass shellcheck"
        fi
      else
        echo "shellcheck not installed — skipping (bash -n already passed)"
      fi
  tags:
    - docker

# ─── Test: E2E infra triage pipeline ───
test-triage-e2e:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  timeout: 10 minutes
  script:
    - echo "Running E2E infra triage tests (light mode)..."
    - bash test-e2e-infra-triage.sh --light 2>&1
  tags:
    - docker

# ─── Test: workflow JSON structure validation ───
test-workflow-validate:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - echo "Validating workflow JSON files have required fields..."
    - |
      ERRORS=0
      for f in workflows/*.json; do
        if [ ! -f "$f" ]; then continue; fi
        RESULT=$(python3 -c "
      import json, sys
      try:
          wf = json.load(open('$f'))
      except json.JSONDecodeError as e:
          print(f'INVALID JSON: {e}')
          sys.exit(1)
      missing = []
      for field in ['id', 'name', 'nodes']:
          if field not in wf:
              missing.append(field)
      if missing:
          print('MISSING FIELDS: ' + ', '.join(missing))
          sys.exit(1)
      nodes = wf.get('nodes', [])
      print(f'OK ({len(nodes)} nodes, name={wf[\"name\"][:60]})')
      " 2>&1)
        STATUS=$?
        if [ $STATUS -ne 0 ]; then
          echo "FAIL: $f — $RESULT"
          ERRORS=$((ERRORS + 1))
        else
          echo "OK: $f — $RESULT"
        fi
      done
      if [ $ERRORS -gt 0 ]; then
        echo "FAILED: $ERRORS workflow files missing required fields"
        exit 1
      fi
      echo "All workflow files have required fields (id, name, nodes)"
  tags:
    - docker

# ─── Review: Claude Code automated MR review ───
claude_review:
  stage: review
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client >/dev/null 2>&1
  script:
    - echo "Running Claude Code MR review..."
    - |
      # SSH to app-user host to run review (Claude Code runs there)
      ssh -i /home/app-user/.ssh/one_key -o StrictHostKeyChecking=no \
        app-user@nl-claude01 \
        "cd ~/gitlab/n8n/claude-gateway && ./scripts/mr-review.sh $CI_PROJECT_ID $CI_MERGE_REQUEST_IID"
  tags:
    - docker

# ─── Sync: GitHub public mirror ───
sync_to_github:
  stage: sync
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_PIPELINE_SOURCE == "push"'
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq >/dev/null 2>&1
    - pip3 install --break-system-packages git-filter-repo >/dev/null 2>&1
    - |
      GITLEAKS_VERSION="8.24.0"
      curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
        | tar xz -C /usr/local/bin gitleaks
      gitleaks version
    - git config --global user.email "ci@example.net"
    - git config --global user.name "GitHub Sync Bot"
    - git config --global init.defaultBranch main
  script:
    - echo "Syncing sanitized mirror to GitHub..."
    - |
      export CI_REPOSITORY_URL="${CI_REPOSITORY_URL}"
      export GITHUB_REPO="papadopouloskyriakos/agentic-chatops"
      export GITHUB_TOKEN="${GITHUB_TOKEN}"
      export REPLACEMENTS_FILE="${CI_PROJECT_DIR}/github-sync/replacements.txt"
      bash github-sync/sync-to-github.sh --verbose
  tags:
    - docker

sync_to_github_dry_run:
  stage: sync
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: manual
      allow_failure: true
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq >/dev/null 2>&1
    - pip3 install --break-system-packages git-filter-repo >/dev/null 2>&1
    - |
      GITLEAKS_VERSION="8.24.0"
      curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
        | tar xz -C /usr/local/bin gitleaks
      gitleaks version
    - git config --global user.email "ci@example.net"
    - git config --global user.name "GitHub Sync Bot"
    - git config --global init.defaultBranch main
  script:
    - echo "Dry run — validating sanitization..."
    - |
      export CI_REPOSITORY_URL="${CI_REPOSITORY_URL}"
      export GITHUB_REPO="papadopouloskyriakos/agentic-chatops"
      export REPLACEMENTS_FILE="${CI_PROJECT_DIR}/github-sync/replacements.txt"
      bash github-sync/sync-to-github.sh --dry-run --verbose
  tags:
    - docker
