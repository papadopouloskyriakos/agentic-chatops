asyncapi: 2.6.0
info:
  title: Claude Gateway Event Surface
  version: 1.0.0
  description: Alert-receiver to triage event flow (REQ-502).
channels:
  triage.requested:
    description: Emitted when an alert receiver dispatches a triage session.
    subscribe:
      operationId: onTriageRequested
      message:
        name: TriageRequested
        contentType: application/json
        payload:
          type: object
          required: [issue_id, host, rule, site, severity]
          properties:
            issue_id: { type: string }
            host: { type: string }
            rule: { type: string }
            site: { type: string }
            severity: { type: string, enum: [warning, critical] }
