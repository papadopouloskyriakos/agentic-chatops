# Deployed to K8s via the IaC tf:
#   infrastructure/nl/production/k8s/namespaces/monitoring/agentic-health-alerts.tf
# This YAML is retained because it is consumed by:
#   - scripts/qa/suites/test-726-prom-alert-rules.sh (promtool test rules)
#   - prometheus/alert-rules/agentic-health.test.yml fixtures
# When adding / changing / removing an alert, edit BOTH files. The IaC tf is
# the deployed truth; this YAML is the test+doc copy. Drift between them is a
# defect — caught by drift-check sweeps over the kube-prometheus rules tree.
groups:
  - name: agentic-health
    interval: 60s
    rules:
      - alert: SkillPrereqMissing
        expr: min by (skill, kind) (chatops_skill_requires_ok_all) == 0
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "Skill {{ $labels.skill }} ({{ $labels.kind }}) has an unsatisfied prereq"
          description: >
            One or more entries in the skill's `requires.bins` or `requires.env`
            block are not available on the host (binary missing, or env var unset).
            Full report: `scripts/audit-skill-requires.sh`. Source of truth:
            `.claude/{{ $labels.kind }}s/.../*.md` frontmatter.
            Runbook: docs/runbooks/ (general skill-maintenance guidance).

      - alert: SkillMetricsExporterStale
        expr: time() - chatops_skill_metrics_last_run_timestamp > 1800
        for: 10m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "skill-metrics exporter has not run in 30+ minutes"
          description: >
            `scripts/write-skill-metrics.sh` is cron `*/5` — if its last-run
            timestamp is more than 30 minutes behind, the cron is wedged
            or the script is erroring. Check `crontab -l` and run manually
            to reproduce. Without this exporter, `SkillPrereqMissing`
            cannot fire.

      # IFRNLLEI01PRD-748 / G1.P0.1 — Long-horizon replay eval
      - alert: LongHorizonReplayStale
        expr: time() - chatops_long_horizon_replay_last_run_timestamp > 777600
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "long-horizon replay has not run in 9+ days"
          description: >
            `scripts/long-horizon-replay.py` is wired to a weekly cron
            (`0 5 * * 1`). If its last-run timestamp is more than 9 days behind
            (777600s), the weekly run is wedged or the cron entry is missing.
            Check `crontab -l` and run manually with `--limit 5 --dry-run`
            to reproduce. Without this exporter the NVIDIA dim #9 long-horizon
            evaluation pillar regresses to A-.

      # IFRNLLEI01PRD-748 / G1.P0.2 — Jailbreak corpus regression
      - alert: JailbreakBypassDetected
        expr: max by (category) (chatops_jailbreak_detector_match_total{status="miss"}) > 0
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "Jailbreak fixture(s) drifted in category {{ $labels.category }}"
          description: >
            `scripts/lib/jailbreak_detector.py` produced `expected_categories`
            mismatches against `scripts/qa/fixtures/jailbreak-corpus.json`.
            Either the corpus expectations need updating or a regression has
            been introduced. Run `bash scripts/qa/suites/test-jailbreak-corpus.sh`
            for the full diff.

      # IFRNLLEI01PRD-749 / G2.P0.3 — Intermediate semantic rail drift
      - alert: IntermediateRailDriftHigh
        expr: max by (category) (chatops_intermediate_rail_drift_score) > 0.20
        for: 24h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "Intermediate rail drift > 20% in category {{ $labels.category }} for 24h"
          description: >
            `scripts/lib/intermediate_rail.py` is flagging > 20% of intermediate
            steps as out-of-distribution for this alert category. Either the
            heuristic keyword bucket is too narrow (false positives), the
            agent is going off-topic (real drift), or Ollama is returning bad
            classifications. DARK-FIRST: this alert observes only — no Build
            Prompt blocking. Inspect with:
            `sqlite3 ~/gitlab/products/cubeos/claude-context/gateway.db "SELECT payload_json FROM event_log WHERE event_type='intermediate_rail_check' AND emitted_at > datetime('now','-24 hours') ORDER BY id DESC LIMIT 20"`

      # IFRNLLEI01PRD-1037 — Infragraph health (epic IFRNLLEI01PRD-1029)
      - alert: InfragraphMetricsExporterStale
        expr: time() - infragraph_exporter_last_run_timestamp > 1800
        for: 10m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "infragraph metrics exporter has not run in 30+ minutes"
          description: >
            `scripts/write-infragraph-metrics.py` is cron `*/5` on
            nl-claude01 — if its last-run timestamp is more than 30
            minutes behind, the cron is wedged or the script errors.
            Without it, InfragraphSeedStale and InfragraphPrecisionDrop
            are blind. Runbook: docs/runbooks/infragraph.md.

      - alert: InfragraphSeedStale
        expr: time() - min by (source) (infragraph_last_seed_timestamp{source=~"pve|netbox|librenms"}) > 129600
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "infragraph seed source {{ $labels.source }} stale > 36h"
          description: >
            `scripts/infragraph-seed.py --all` is cron `10 4 * * *` daily.
            A source more than 36h behind means the seeder failed twice or
            the upstream API is unreachable. Automated edges expire 7 days
            after their last seed (valid_until) — stale seeds degrade into
            visible stale_edges, never silently wrong predictions, but fix
            within the week. Run manually:
            `python3 scripts/infragraph-seed.py --all` and read stderr.
            Runbook: docs/runbooks/infragraph.md.

      # InfragraphPrecisionDrop reads the OPERATIVE fold-band precision
      # (cascade_prob_family >= 0.60), NOT the raw exact-match precision_30d.
      # precision_30d scores the full enumerated blast radius — dozens of
      # intentionally-low-probability candidate rows — so it is structurally
      # ~0.05-0.15 by design and has been since the predictions table started
      # (2026-06-09); it never approaches 0.80 and is the wrong series for this
      # bar. The 0.80 threshold is the operator-set fold/suppression gate
      # (FOLD_GATE.fold_min_precision, IFRNLLEI01PRD-1040), which only governs the
      # fold-band. fold_band_n_30d guards against alerting on a thin band.
      - alert: InfragraphPrecisionDrop
        expr: infragraph_precision_fold_family_30d < 0.80 and infragraph_fold_band_n_30d > 20
        for: 6h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "infragraph 30d fold-band precision below 0.80 (fold gate not met)"
          description: >
            Fold-band shadow predictions (cascade_prob_family >= 0.60) are scoring
            below 0.80 family precision over 30 days — the operative fold/suppression
            precision the -1040 gate applies to. The fail-CLOSED fold gate
            (infragraph-propose-blast-radius.py `_autofold_authorized`) blocks
            autonomous blast-radius folding while this holds, so no wrong folds occur;
            this alert means the cascade model is not yet precise enough at the fold
            confidence band — topology changed without a reseed, learned dynamics
            went stale, or the band genuinely has not converged. Investigate BEFORE
            relying on the -1040 gate review. NOTE: the raw infragraph_precision_30d
            series is structurally low by design (scores the full enumerated blast
            radius) and is NOT what this alert measures. Scorecard:
            test-results/infragraph-scorecard.json. Runbook: docs/runbooks/infragraph.md.

      # ── QA harness observability (IFRNLLEI01PRD-1089, 2026-06-16) ──
      # The 51-suite QA harness now runs nightly (cron 04:30) + exports via
      # scripts/write-qa-metrics.sh (*/5). Previously it ran nowhere.
      - alert: ChatOpsQASuiteFailing
        expr: chatops_qa_total_fail{label="latest"} > 0
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "QA suite has {{ $value }} failing test(s)"
          description: >
            scripts/qa/run-qa-suite.sh reported failing tests in its latest
            nightly run. Inspect the newest scripts/qa/reports/scorecard-*.json
            and run `scripts/qa/run-qa-suite.sh --verbose` for the failing suite.
      - alert: ChatOpsQAMetricsStale
        expr: time() - chatops_qa_last_run_timestamp{} > 129600
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "QA-suite scorecard is stale (>36h since last run)"
          description: >
            No fresh QA scorecard in over 36h (nightly cron is 04:30). The
            run-qa-suite.sh cron on nl-claude01 or write-qa-metrics.sh may
            have stopped. Check /tmp/qa-suite.log.

      # ── Serving reliability: cost-budget + trace-surface (IFRNLLEI01PRD-1094) ──
      # NOTE (IFRNLLEI01PRD-1571 #1, operator decision 2026-07-05): ChatOpsCostBudgetHigh is
      # INTENTIONALLY NOT DEPLOYED — kept here as a definition, excluded from the in-cluster
      # PrometheusRule. Reason: llm_cost_today is an API-EQUIVALENT figure, NOT real dollars
      # spent — the Tier-2 estate runs on a FLAT-RATE subscription (Max / Z.ai) whose per-token
      # spend is $0, so the API-equivalent number routinely exceeds $20/day while actual spend is
      # nil. The earlier "cost_usd is now true USD" comment was incorrect for the subscription
      # plane. A real-USD budget alert on this series would false-fire. Do NOT deploy until the
      # cost semantics are resolved (either point it at a genuine paid-per-token series — Mistral/
      # DeepSeek via LiteLLM — or redefine the threshold in API-equivalent terms with an operator-
      # agreed number). Runner/n8n liveness + zombies: gateway-watchdog.sh; session rows durable
      # post-DB-unification (IFRNLLEI01PRD-1090).
      - alert: ChatOpsCostBudgetHigh
        expr: sum(llm_cost_today{label!="boot"}) > 20
        for: 10m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "Today's LLM spend ${{ $value | printf \"%.2f\" }} approaching the $25 daily gate"
          description: >
            sum(llm_cost_today) crossed $20 (the Runner's hard MAX_DAILY gate is
            $25, after which sessions are refused). Investigate a cost spike /
            runaway loop before the gate trips. Ledger: llm_usage on the unified
            gateway.db.
      - alert: ChatOpsTraceSpanErrors
        expr: trace_span_errors_7d > 5
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "{{ $value }} errored tool/agent spans in the last 7d"
          description: >
            The OTel trace surface (now content-bearing, IFRNLLEI01PRD-1095) shows
            elevated tool/agent span errors. Inspect OpenObserve / otel_spans for
            the failing operations.
      # IFRNLLEI01PRD-1152 — control-plane dead-man's-switch. Doc/test copy; the
      # DEPLOYED truth is infrastructure/nl/production/.../agentic-health-alerts.tf.
      # tier=1+critical => twilio-tier1 SMS. The absent() clause closes the
      # "no-data = no-alert" gap if node_exporter/claude01 itself dies.
      - alert: GatewayWatchdogHeartbeatStale
        expr: (time() - max by (host) (gateway_watchdog_heartbeat_timestamp_seconds) > 900) or absent(gateway_watchdog_heartbeat_timestamp_seconds)
        for: 5m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "gateway-watchdog has not run in 15+ min (or metric absent) — autonomy control plane unmonitored"
          description: >
            scripts/gateway-watchdog.sh (cron */5 on nl-claude01) emits
            gateway_watchdog_heartbeat_timestamp_seconds via a trap on every run.
            Staleness/absence means the cron, host, node_exporter, or script is
            dead — nothing is watching/auto-healing the 9 receivers + runner (the
            months-long-silent-dark failure class). Runbook:
            docs/runbooks/gateway-watchdog-deadman.md.
      - alert: GatewayWorkflowInactive
        expr: min by (workflow) (gateway_workflow_active) == 0
        for: 15m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "n8n workflow {{ $labels.workflow }} inactive across 3+ watchdog runs (reactivation not holding)"
          description: >
            gateway-watchdog.sh found this workflow inactive and tried to
            reactivate it, but it is still inactive 15 min later. A dead
            receiver/runner means alerts silently stop dispatching. Runbook:
            docs/runbooks/gateway-watchdog-deadman.md.
      # IFRNLLEI01PRD-1154 — synthetic-incident canary (classify->predict spine).
      - alert: SyntheticCanaryLeak
        expr: synthetic_incident_canary_live_db_leak > 0
        for: 0m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "synthetic canary leaked {{ $value }} rows into the LIVE gateway.db — isolation broke"
          description: >
            synthetic-incident-canary.sh must run the spine against an isolated
            temp DB; a non-zero leak means a canary row reached the live
            session_risk_audit/infragraph_predictions and could skew metrics or
            collide a real fail-closed gate. Page + disable the cron until fixed.
            Runbook: docs/runbooks/synthetic-incident-canary.md.
      - alert: SyntheticCanaryFailing
        expr: synthetic_incident_canary_stages_passed < 3
        for: 6h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "synthetic canary passing only {{ $value }}/3 spine stages"
          description: >
            classify->predict spine is degraded (empty plan, no band, broken gate
            logic). Inspect ~/logs/claude-gateway/synthetic-canary.log; run
            scripts/synthetic-incident-canary.sh --verbose. Runbook:
            docs/runbooks/synthetic-incident-canary.md.
      - alert: SyntheticCanaryTier1Inert
        expr: synthetic_incident_canary_stage_ok{stage="tier1_suppress"} == 0
        for: 6h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "synthetic canary: tier-1 suppression is not folding a synthetic blast-radius alert"
          description: >
            The canary seeds a synthetic blast-radius rule in its isolated DB and asserts
            tier1_suppression folds a matching alert (IFRNLLEI01PRD-1155 fault-5: tier-1 silently
            inert — host-pinned/expired rows or a logic/REDACTED_a7b84d63gression stop the whole suppression
            path). If this is 0, real suppression is likely broken too (alerts that should dedup are
            escalating). Run scripts/synthetic-incident-canary.sh --verbose; inspect
            scripts/lib/tier1_suppression.py. Runbook: docs/runbooks/synthetic-incident-canary.md.
      - alert: SyntheticCanaryStale
        expr: (time() - synthetic_incident_canary_last_run_timestamp > 172800) or absent(synthetic_incident_canary_last_run_timestamp)
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "synthetic canary has not run in 48h+ (or metric absent)"
          description: >
            The daily 02:37 canary cron is not firing on nl-claude01. The
            spine is no longer being probed. Runbook: docs/runbooks/synthetic-incident-canary.md.
      # IFRNLLEI01PRD-1153 — governance metrics freshness (false-auto-resolve KPIs).
      - alert: GovernanceMetricsStale
        expr: (time() - chatops_governance_metrics_last_run_timestamp > 3600) or absent(chatops_governance_metrics_last_run_timestamp)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "governance metrics (false-auto-resolve / repeat-incident) stale 1h+"
          description: >
            scripts/write-governance-metrics.py (cron */17) is wedged — the
            auto-resolve safety KPIs are no longer being computed. Run it by hand
            and read stderr.
      # IFRNLLEI01PRD-1408 — territory-gate wiring watchdog (the hook only enforces if wired).
      - alert: TerritoryGateUnwired
        expr: gateway_territory_gate_wiring_violation == 1
        for: 15m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "territory gate ON but its PreToolUse hook is UNWIRED — enforcement silently off"
          description: >
            ~/gateway.territory_gate exists but scripts/hooks/territory-gate.py is no longer
            referenced in a session-settings surface (interactive and/or dispatched) or fails
            to parse, so high-stakes network/k8s/pve writes can run WITHOUT loading the
            territory CLAUDE.md. Re-wire it in ~/.claude/settings.json +
            config/dispatched-session-settings.json, or rm ~/gateway.territory_gate to
            intentionally disable the gate. Check: scripts/check-territory-gate-wiring.sh.
      - alert: TerritoryGateWiringCheckStale
        expr: (time() - gateway_territory_gate_wiring_last_run_timestamp > 3600) or absent(gateway_territory_gate_wiring_last_run_timestamp)
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "territory-gate wiring check stale 1h+ (or metric absent)"
          description: >
            The */15 scripts/check-territory-gate-wiring.sh cron is not firing on
            nl-claude01, so an unwiring would go undetected. Run it by hand.
      # --- Dark-component audit 2026-06-25 (IFRNLLEI01PRD-1421): the self-audit tier was
      # itself dark — holistic-agentic-health.sh was never cronned, and audit-risk-decisions.sh
      # (the auto-resolve SAFETY invariant) only ran from inside it. These make the
      # watchdog-of-watchdogs liveness + the safety floor page on their own.
      - alert: HolisticHealthStale
        expr: (time() - holistic_health_last_run_timestamp_seconds > 90000) or absent(holistic_health_last_run_timestamp_seconds)
        for: 1h
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "holistic-agentic-health.sh has not run in 25h+ (or metric absent) — the 138-check master watchdog is dark"
          description: >
            scripts/holistic-agentic-health.sh (daily 05:00 cron on nl-claude01) is the
            ONLY caller of many unique structural + safety checks (the band-aware risk-audit
            invariant, per-table staleness, schema integrity). Staleness/absence means the
            catch-all watchdog is itself unwatched — the exact months-dark failure class the
            2026-06-25 dark-component audit found. Triage: crontab -l | grep holistic;
            tail ~/logs/claude-gateway/holistic-health.log.
      - alert: HolisticHealthFailing
        expr: holistic_health_fail > 0
        for: 2h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "holistic-agentic-health.sh reports failing check(s)"
          description: >
            One or more of the structural/safety checks is FAILING. Read the [FAIL] lines in
            ~/logs/claude-gateway/holistic-health.log. (Dormant-by-design checks, e.g. retired
            OpenClaw, are WARN not FAIL, so a FAIL here is a real regression.)
      - alert: RiskAuditFloorViolation
        expr: risk_audit_fail == 1
        for: 5m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "auto-resolve SAFETY invariant VIOLATED — an auto-approval is outside AUTO/AUTO_NOTICE or carries a floor signal"
          description: >
            scripts/audit-risk-decisions.sh (band-aware, emitted by write-audit-metrics.sh daily)
            found an auto_approved session that is outside AUTO/AUTO_NOTICE or carries an
            irreversible:* / critical:p0-reboot / deviation floor signal — the autonomy-forward
            never-auto floor was breached. Inspect session_risk_audit + the audit output now.
            Runbook: docs/runbooks/risk-based-auto-approval.md.
      - alert: RiskAuditStale
        expr: (time() - risk_audit_last_run_timestamp_seconds > 90000) or absent(risk_audit_last_run_timestamp_seconds)
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "the auto-resolve safety audit has not run in 25h+ (or metric absent)"
          description: >
            scripts/write-audit-metrics.sh (daily 05:15) is not running — the band-aware
            auto-resolve safety invariant is no longer checked automatically. Run it by hand.
      - alert: RegistryCriticalDark
        expr: registry_critical_dark_total > 0
        for: 15m
        labels:
          severity: critical
          category: agentic-platform
          tier: "1"
        annotations:
          summary: "{{ $value }} CRITICAL registered component(s) went dark"
          description: >
            The component registry (orchestrator Brick 1, scripts/registry-check.py) found a
            component marked critical failing its liveness check — a self-audit / dead-man's
            watchdog / core Runner+Poller / analytics writer stopped producing. This is the
            dark-component failure class (IFRNLLEI01PRD-1421), now mechanically detected instead
            of by a manual quarterly audit. See registry_component_dark{name} for which one.
            Inspect: python3 scripts/registry-check.py. Manifest: config/component-registry.json.
      - alert: RegistryCheckStale
        expr: (time() - registry_check_last_run_timestamp_seconds > 5400) or absent(registry_check_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "the component registry liveness check has not run in 90m+ (or metric absent)"
          description: >
            scripts/registry-check.py (cron */30) is the who-watches-the-watcher for the whole
            federation — if IT goes dark, no component's liveness is verified. The absent() clause
            closes the no-data=no-alert gap (the same failure mode that hid the original dark
            components). Run it by hand + check the */30 registry cron.
      - alert: InteractionGraphGap
        expr: interaction_graph_gaps_total > 0
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "{{ $value }} table(s) read but written by no live component (orphan consumer)"
          description: >
            Orchestrator Brick 2 (scripts/interaction-graph.py): a registered table is READ by a
            component but WRITTEN by none — the Session-End->reconcile hole class that silently
            darkened 4 analytics tables (a handoff where neither side owns the side-effect). This
            is structural drift, now mechanically detected. See config/interaction-graph.json gaps[].
      - alert: OrchestrationSafetyFailure
        expr: orchestration_benchmark_safety_failures > 0
        for: 5m
        labels:
          severity: critical
          category: agentic-platform
          tier: "1"
        annotations:
          summary: "{{ $value }} orchestration safety-composition failure(s) — an irreversible incident was auto-resolved"
          description: >
            Orchestrator Brick 3 (scripts/orchestration-benchmark.py): the never-auto floor FAILED
            on the synthetic incident stream — an irreversible/destructive scenario (mkfs / zpool
            destroy / dropdb / rm -rf / terraform destroy) was classified band=AUTO. The autonomy
            safety composition is broken at the orchestration level. See
            config/orchestration-scorecard.json I1_safety_composition.failures.
      - alert: OrchestrationBenchmarkStale
        expr: (time() - orchestration_benchmark_last_run_timestamp_seconds > 1209600) or absent(orchestration_benchmark_last_run_timestamp_seconds)
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "the orchestration-level benchmark has not run in 2w+ (or metric absent)"
          description: >
            scripts/orchestration-benchmark.py (cron weekly) verifies the orchestration invariants
            (safety-composition / determinism / completeness / structural-integrity) over a replayed
            incident stream. If it stops, whole-system orchestration is no longer verified.
      - alert: CronicleSchedulerDown
        expr: cronicle_scheduler_up == 0 or absent(cronicle_scheduler_up)
        for: 10m
        labels:
          severity: critical
          category: agentic-platform
          tier: "1"
        annotations:
          summary: "the Cronicle job scheduler is DOWN — the platform's cron scheduling has stopped"
          description: >
            Cronicle (native on nl-claude01, systemd cronicle.service) runs ALL 172 migrated cron
            jobs across both agentic systems (gateway + agora) since 2026-06-26; if it is down, nothing
            is scheduled. The absent() clause closes no-data=no-alert (the exporter is itself a Cronicle
            job, so scheduler-death also stops the metric). Check: systemctl status cronicle;
            curl http://10.0.181.X:3012. Rollback: crontab /home/app-user/crontab.full-snapshot-pre-cronicle.
      - alert: CronicleJobsFailing
        expr: cronicle_jobs_failed_recently > 0
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "{{ $value }} Cronicle job(s) have a recent failed run"
          description: >
            scripts/write-cronicle-metrics.py: one or more scheduled jobs exited non-zero in the recent
            history window — the per-job-death signal raw cron could never surface (only the 11 critical
            metric-writers were liveness-tracked before; the migration immediately caught 4 silently
            failing writers). See the Cronicle UI http://10.0.181.X:3012 job history.
      - alert: CronicleMetricsStale
        expr: (time() - cronicle_metrics_last_run_timestamp_seconds > 2400) or absent(cronicle_metrics_last_run_timestamp_seconds)
        for: 15m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "the Cronicle health exporter has not run in 40m+ (or metric absent)"
          description: >
            scripts/write-cronicle-metrics.py (a Cronicle job, */10) stopped emitting — the orchestrator's
            window into the scheduler is dark. prom:cronicle_metrics is also a critical registry component.

      - alert: ComposedEvalJudgeFooled
        expr: max(eval_composed_judge_fooled_total) >= 2
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "LLM judge approved {{ $value }} structurally-incomplete sessions (judge-fooled)"
          description: >
            scripts/compose-eval-verdict.py (IFRNLLEI01PRD-1452) composes session_trajectory (hard checks) with
            session_judgment (LLM rubric); eval_composed_judge_fooled_total counts sessions the judge APPROVED
            but whose trajectory completed too few required steps (hard-veto overrode it). Inspect:
            compose-eval-verdict.py --recent 30; feed into judge calibration.
      - alert: ComposedEvalMetricsStale
        expr: (time() - eval_composed_last_run_timestamp_seconds > 21600) or absent(eval_composed_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "composed eval-verdict metric stale 6h+ (or absent) — the judge/composer cron is wedged"
          description: >
            compose-eval-verdict.py --metrics runs at the tail of llm-judge.sh (*/2h); staleness/absence means
            the judge cron or composer is broken. Run scripts/compose-eval-verdict.py --metrics to reproduce.
      - alert: JudgeFrontierDrift
        expr: (judge_frontier_action_agreement_rate >= 0 and judge_frontier_action_agreement_rate < 0.6 and judge_frontier_pairs > 5) or judge_frontier_local_unscored_rate > 0.5
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "frontier (Opus) vs local judge diverged or the local judge is dead"
          description: >
            judge-frontier-crosscheck.py (IFRNLLEI01PRD-1451, no-human anchor) re-judges a sample with Opus and
            compares to the local gemma judge. Low action-agreement (<0.6 over >5 pairs) = drift;
            judge_frontier_local_unscored_rate>0.5 = the local judge returns -1 while the frontier scores real
            (the 3-week dead-judge class, 2026-06-27). Inspect: scripts/judge-frontier-crosscheck.py --run 8.
      - alert: JudgeFrontierStale
        expr: (time() - judge_frontier_last_run_timestamp_seconds > 172800) or absent(judge_frontier_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "judge frontier cross-check stale 2d+ (or absent) — the no-human judge-health anchor is itself dark"
          description: >
            judge-frontier-crosscheck.py --metrics refreshes at the tail of llm-judge.sh (*/2h); the daily --run
            does the Opus crosschecks. Staleness/absence means the anchor stopped running.
      - alert: AutoResolveFalseResolveHigh
        expr: autoresolve_held_rate >= 0 and autoresolve_held_rate < 0.6 and autoresolve_evaluated > 8
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "auto-resolved fixes are not holding (held_rate {{ $value }})"
          description: >
            session-outcome-truth.py (IFRNLLEI01PRD-1451, no-human anchor) checks whether an auto-resolved
            incident's alert re-fired within 24h (mirrors the -1153 governance; chronic/dispositioned patterns
            excluded). A low held_rate over a real sample means autonomy is "resolving" incidents that come back.
            Inspect: scripts/session-outcome-truth.py --run; SELECT * FROM autoresolve_outcome WHERE held=0.
      - alert: AutoResolveJudgeMissedFalseResolve
        expr: autoresolve_judge_missed_false_resolve > 0 and autoresolve_evaluated > 8
        for: 1h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "the LLM judge endorsed {{ $value }} auto-resolves that turned out to be false-resolves"
          description: >
            A genuine false-resolve (the fix did not hold) that the judge SCORED >=4 — a judge calibration miss
            no purely-LLM metric can see, and the core reason this no-human outcome anchor exists. Feed these
            sessions back into judge calibration. SELECT * FROM autoresolve_outcome WHERE held=0 AND judge_score>=4.
      - alert: AutoResolveOutcomeStale
        expr: (time() - autoresolve_last_run_timestamp_seconds > 172800) or absent(autoresolve_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "outcome-truth metric stale 2d+ (or absent) — the 'did autonomy work' anchor is dark"
          description: >
            session-outcome-truth.py --metrics refreshes at the tail of llm-judge.sh; the daily --run re-evaluates
            from triage.log. Staleness/absence means the anchor stopped running.
      - alert: JudgeScoredFractionLow
        expr: judge_scored_fraction >= 0 and judge_scored_fraction < 0.5 and judge_eligible_sessions > 3
        for: 2h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "local LLM judge scored only {{ $value }} of recent sessions — semantic judge-death detector"
          description: >
            write-governance-metrics.py computes the fraction of sessions ended 26h..2h ago that carry a real
            (overall_score>=0) session_judgment row — from tables the judge does NOT write, so it cannot be
            fooled by the judge's own green liveness signals. Built 2026-07-03 after the judge died twice
            (heredoc-injection 06-07..06-27, type-filter regression 06-27..07-03) with every process-liveness
            signal green. Inspect: tail /tmp/llm-judge.log; sqlite3 gateway.db "SELECT judge_model, MAX(judged_at)
            FROM session_judgment GROUP BY 1".

  # ── scheduled-reboot suppression (self-learning, 2026-06-29) ──────────────
  # NOTE: the two-phase verify-and-reopen ALREADY pages on a misclassified
  # suppression (Matrix #alerts + force-escalate) without needing these alerts;
  # these are the aggregate/secondary layer. TODO(tf-twin): deploy this group via
  # the IaC tf twin (infrastructure/nl/production/.../agentic-health-alerts.tf)
  # in a follow-up MR — YAML↔tf drift is a defect, so ship them together.
      - alert: PromptTrialMalformedIssueIds
        expr: prompt_trial_malformed_issue_ids > 0
        for: 10m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "prompt A/B trial assignments carry malformed issue_ids"
          description: >
            session_trial_assignment rows have an empty or quote-wrapped issue_id, which cannot join
            session_judgment.issue_id — the exact defect (empty pre-MR!155, quoted pre-MR!156) that
            silently starved every prompt trial for ~2.5 months. Check the Runner Query Knowledge
            ISSUE_ID wiring + scripts/prompt-trial-assign.py normalization. Ref IFRNLLEI01PRD-1664/1666.
      - alert: WorkspaceGuardrailWriterStale
        expr: time() - workspace_guardrail_last_run_timestamp > 1800
        for: 15m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "workspace-guardrail health writer stale 30m+ (Global-Workspace guardrails unmonitored)"
          description: >
            write-workspace-guardrail-metrics.py (piggybacked on write-governance-metrics.py */15) has
            stopped emitting prom:workspace_guardrail — the LIVE silent-cognition guard + prompt-patch
            feature states are no longer observed. Check the governance-metrics Cronicle job. Ref
            IFRNLLEI01PRD-1663.
  - name: scheduled-reboot
    interval: 60s
    rules:
      - alert: ScheduledRebootMisclassified
        expr: increase(scheduled_reboot_misclassified_total[1h]) > 0
        for: 1m
        labels:
          severity: critical
          tier: "1"
          category: agentic-platform
        annotations:
          summary: "scheduled-reboot two-phase verify REOPENED {{ $value }} suppression(s) in 1h"
          description: >
            A reboot suppressed as 'scheduled' was confirmed by the two-phase verify NOT to be a clean
            systemd-reboot (OOM/watchdog/self-heal landed in-window). The verify already force-escalated
            a real investigation + paged #alerts; this alert is the aggregate signal.
      - alert: ScheduledRebootMetricsStale
        expr: (time() - scheduled_reboot_metrics_last_run_timestamp_seconds > 1200) or absent(scheduled_reboot_metrics_last_run_timestamp_seconds)
        for: 30m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "scheduled-reboot metrics exporter stale 20m+ (or absent)"
          description: >
            write-scheduled-reboot-metrics.sh (*/5 Cronicle) is not running. Registry counts + verify
            accumulators stop updating.
      - alert: ScheduledRebootPromotionStuck
        expr: scheduled_reboot_registry_entries{status="observing"} > 0 and on() (time() - scheduled_reboot_metrics_last_run_timestamp_seconds < 1200)
        for: 3h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "scheduled-reboot: observing row(s) not promoting to live"
          description: >
            A discovered schedule has stayed 'observing' — either its cron never fires as predicted (wrong
            attribution) or the promoter can't SSH the host. Check promote-scheduled-reboot logs.

  - name: renovate-autonomy
    rules:
      - alert: RenovateAutonomyFloorBreach
        expr: renovate_autonomy_merged_without_snapshot_total > 0
        for: 0m
        labels:
          severity: critical
          category: agentic-platform
          tier: "1"
        annotations:
          summary: "Renovate autonomy: {{ $value }} live AUTO merge(s) bypassed the CI/review/snapshot floor"
          description: >
            renovate_autonomy_merged_without_snapshot_total is the lane's hard safety invariant and MUST be 0
            — a non-zero value means a live AUTO merge reached main without the independent floor (CI success ∧
            review APPROVE ∧ snapshot-if-required ∧ not-never_auto ∧ unchanged head_sha). Inspect the audit
            ledger: sqlite3 gateway.db "SELECT * FROM renovate_autonomy_audit WHERE decision='AUTO' ORDER BY ts
            DESC". Writer: scripts/write-renovate-autonomy-metrics.py. Gate: scripts/renovate-mr-gate.sh.
      - alert: RenovateAutonomyMetricsStale
        expr: (time() - renovate_autonomy_last_run_timestamp_seconds > 1800) or absent(renovate_autonomy_last_run_timestamp_seconds)
        for: 20m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "Renovate autonomy metrics exporter stale 30m+ (or absent)"
          description: >
            scripts/write-renovate-autonomy-metrics.py (*/5 Cronicle 'renovate-autonomy-metrics') has not
            refreshed — the floor-breach invariant + decision counters are no longer being recomputed, so a
            real breach could go unseen. Check the Cronicle job + the textfile collector
            /var/lib/node_exporter/textfile_collector/renovate_autonomy_metrics.prom.
      - alert: EscalationRequeueStale
        expr: (time() - escalation_requeue_last_run_timestamp_seconds > 1800) or absent(escalation_requeue_last_run_timestamp_seconds)
        for: 15m
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "escalation requeue job stale 30m+ (or absent) — dropped escalations are not being retried"
          description: >
            scripts/requeue-escalations.py (*/10 Cronicle 'requeue-escalations', IFRNLLEI01PRD-1709) is the
            consumer for escalation_queue: it re-fires Runner-LOCKED-dropped escalations when the slot frees
            and re-escalates orphaned-poll issues whose condition is still active. If it stops, the platform
            regresses to silently dropping accepted escalations (the 2026-06-30 nl-pve01 burst class).
            Check the Cronicle job + /var/lib/node_exporter/textfile_collector/escalation_requeue.prom.
      - alert: EscalationQueueStuck
        expr: escalation_requeue_rows{status="pending"} > 0
        for: 6h
        labels:
          severity: warning
          category: agentic-platform
        annotations:
          summary: "escalation_queue has {{ $value }} pending row(s) older than 6h — not draining"
          description: >
            Pending escalation_queue rows should drain within minutes (slot-locked: next free slot;
            poll-recheck: at eligible_at). 6h of continuous pending means the requeue consumer is failing,
            the slot lock is wedged, or YouTrack lookups are erroring (rows held on yt-lookup-failed).
            Inspect: sqlite3 gateway.db "SELECT * FROM escalation_queue WHERE status='pending'".
