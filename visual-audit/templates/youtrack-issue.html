<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1440">
<title>YouTrack Audit — {{ISSUE_ID}}</title>
<style>
  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── Page ── */
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    font-size: 14px;
    line-height: 1.6;
    color: #1f2937;
    background: #f3f4f6;
    padding: 0;
  }

  /* ── YouTrack header bar ── */
  .yt-header {
    background: #1a1a2e;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .yt-header .logo {
    font-weight: 700;
    font-size: 16px;
    color: #c084fc;
  }
  .yt-header .breadcrumb {
    font-size: 13px;
    color: #94a3b8;
  }

  /* ── Issue container ── */
  .yt-issue {
    max-width: 960px;
    margin: 24px auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  /* ── Issue header ── */
  .yt-issue-header {
    padding: 24px 32px 16px;
    border-bottom: 1px solid #e5e7eb;
  }
  .yt-issue-id {
    font-size: 13px;
    font-weight: 600;
    color: #6b7280;
    margin-bottom: 6px;
  }
  .yt-issue-summary {
    font-size: 22px;
    font-weight: 700;
    color: #111827;
    line-height: 1.3;
  }

  /* ── Description ── */
  .yt-description {
    padding: 20px 32px 24px;
    border-bottom: 1px solid #e5e7eb;
  }
  .yt-section-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #9ca3af;
    margin-bottom: 10px;
  }

  /* ── Markdown content (description + comments) ── */
  .md-content {
    font-size: 14px;
    line-height: 1.7;
    color: #374151;
    word-break: break-word;
  }
  .md-content h1 { font-size: 20px; font-weight: 700; margin: 16px 0 8px; color: #111827; }
  .md-content h2 { font-size: 17px; font-weight: 700; margin: 14px 0 6px; color: #111827; }
  .md-content h3 { font-size: 15px; font-weight: 600; margin: 12px 0 4px; color: #111827; }
  .md-content p { margin-bottom: 8px; }
  .md-content p:last-child { margin-bottom: 0; }

  .md-content strong { font-weight: 600; color: #111827; }
  .md-content em { font-style: italic; }

  .md-content code {
    font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12.5px;
    background: #f3f4f6;
    padding: 2px 6px;
    border-radius: 4px;
    color: #be185d;
  }
  .md-content pre {
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 14px 18px;
    border-radius: 8px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
  }
  .md-content pre code {
    background: none;
    padding: 0;
    color: inherit;
    border-radius: 0;
  }

  .md-content a { color: #2563eb; text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }

  .md-content ul, .md-content ol {
    margin: 6px 0 6px 24px;
  }
  .md-content li { margin-bottom: 3px; }

  .md-content table {
    border-collapse: collapse;
    margin: 10px 0;
    font-size: 13px;
    width: 100%;
  }
  .md-content th, .md-content td {
    border: 1px solid #d1d5db;
    padding: 6px 12px;
    text-align: left;
  }
  .md-content th {
    background: #f9fafb;
    font-weight: 600;
    color: #374151;
  }
  .md-content tr:nth-child(even) td {
    background: #f9fafb;
  }

  .md-content blockquote {
    border-left: 3px solid #6366f1;
    padding: 6px 14px;
    margin: 8px 0;
    color: #6b7280;
    background: #f9fafb;
    border-radius: 0 6px 6px 0;
  }

  .md-content hr {
    border: none;
    border-top: 1px solid #e5e7eb;
    margin: 14px 0;
  }

  /* ── Comments section ── */
  .yt-comments {
    padding: 20px 32px 24px;
  }
  .yt-comment {
    margin-bottom: 20px;
    padding-bottom: 20px;
    border-bottom: 1px solid #f3f4f6;
  }
  .yt-comment:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .yt-comment-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .yt-comment-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #6366f1;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .yt-comment-author {
    font-weight: 600;
    font-size: 14px;
    color: #111827;
  }
  .yt-comment-date {
    font-size: 12px;
    color: #9ca3af;
  }
  .yt-comment-body {
    padding-left: 36px;
  }

  /* ── Audit annotations ── */
  .audit-section {
    max-width: 960px;
    margin: 16px auto;
  }
  .audit-note {
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 8px;
    font-size: 12px;
    color: #92400e;
  }
  .audit-note::before {
    content: 'AUDIT: ';
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="yt-header">
    <span class="logo">YouTrack</span>
    <span class="breadcrumb">{{ISSUE_ID}} — Visual Audit</span>
  </div>

  <div class="yt-issue">
    <div class="yt-issue-header">
      <div class="yt-issue-id">{{ISSUE_ID}}</div>
      <div class="yt-issue-summary">{{SUMMARY}}</div>
    </div>

    <div class="yt-description">
      <div class="yt-section-label">Description</div>
      <div class="md-content">{{DESCRIPTION}}</div>
    </div>

    <div class="yt-comments">
      <div class="yt-section-label">Comments</div>
      {{COMMENTS}}
    </div>
  </div>

  <div class="audit-section">
    {{AUDIT_NOTES}}
  </div>
</body>
</html>
