  # ---- L1 WAN Failover (Freedom ONT port shutdown) ----

  - id: freedom-ont-shutdown
    title: "Freedom ONT Port Shutdown (L1 WAN Failover)"
    description: |
      Shut nl-sw01 Gi1/0/36 — the PoE port that carries the fibre ONT
      for Freedom PPPoE. Exercises the full L1→L2→L3 failover cascade:
      ASA `outside_freedom` loses PPPoE, SLA track 1 goes down, default
      route flips to outside_budget (track 2), rtr01 becomes the active
      edge, 3 Budget VTIs take over BGP carriage, tenants keep Internet
      via rtr01 Dialer1 with the 15 Mbps/room input policer.
    category: wan-failover
    steady_state_hypothesis:
      title: "Inter-site connectivity holds on Budget; Freedom recovers on no-shut"
      probes:
        - {type: http, targets: ["kyriakos.papadopoulos.tech", "get.cubeos.app", "meshsat.net", "mulecube.com"], tolerance: {min_ok: 4}}
        - {type: prometheus, query: "count(frr_bgp_peer_state{state='established'})", tolerance: {range: [20, 60]}}
        - {type: vti-ping, targets: ["10.255.200.X", "10.255.200.X", "10.255.200.X"], tolerance: {reachable: true}}
    method:
      - type: ios-port-shutdown
        target: nl-sw01
        interface: "GigabitEthernet1/0/36"
        runner: "scripts/chaos-port-shutdown.py"   # primitive landed 2026-04-22 per IFRNLLEI01PRD-705
        notes: |
          Executed by scripts/chaos-port-shutdown.py (runs autonomously
          under cron). The script shuts the port, observes for up to
          observation_seconds (default 900 = 15 min), then restores with
          the PoE re-cycle recipe (power inline never/auto + shut/no shut)
          required for Genexis XGS-PON ONT cold-boot (see memory
          freedom_ont_poe_recycle_gotcha_20260422.md).
    rollbacks:
      - type: ios-port-noshut
        target: nl-sw01
        interface: "GigabitEthernet1/0/36"
        force_poe_cycle: true
        runner: "scripts/chaos-port-shutdown.py"
        notes: |
          Invoked by chaos-port-shutdown.py automatically at end of
          observation window OR on abort. Try/finally guarantees this
          runs even on scenario crash (operator-safety invariant).
    safety:
      requires_backup:
        - ["NL ↔ GR", "budget"]
        - ["NL ↔ NO", "budget"]
        - ["NL ↔ CH", "budget"]
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 90}
      graph_connectivity: true
    slo:
      max_convergence_seconds: 120
      max_mttd_seconds: 10
      tenant_internet_lost_seconds: 90   # baseline from 2026-04-22 exercise
    schedule:
      frequency: monthly
      tier: primary
    runbook_ref: "docs/failover-simulation-freedom-ont-20260422.md"

  # ---- DMZ Container Chaos ----

  - id: dmz-nl-all-containers
