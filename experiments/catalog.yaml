        target: nl-dmz01
        services: [portfolio, cubeos-website, meshsat-website, mulecube]
    safety:
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
      excluded_containers: [meshsat-mariadb, meshsat-hub, meshsat-garbd]
    slo:
      max_convergence_seconds: 120
    schedule:
      frequency: monthly
      tier: secondary

  - id: dmz-gr-all-containers
