    category: wan-failover
    method:
      - type: asa-tunnel-shutdown
        target: gr-fw01
        interface: Tunnel3
        tunnel_pair: ["GR \u2194 CH", "inalan"]
    rollbacks:
      - type: asa-tunnel-noshut
        target: gr-fw01
        interface: Tunnel3
    safety:
