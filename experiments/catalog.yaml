# Chaos Engineering Experiment Catalog
# Declarative format compatible with Chaos Toolkit (CT-1) and Azure Chaos Studio (AZ-1)
# Replaces hardcoded BASELINE_TEST_MATRIX and CHAOS_TUNNELS Python dicts
#
# Schema: experiments/schema.json
# Loader: scripts/chaos_catalog.py

version: "1.0"

# CT: Business alignment (contributions model)
contributions:
  reliability: "high"
  availability: "high"
  performance: "medium"
  security: "none"

# AZ: Target capability registration
targets:
  - id: nl-fw01
    type: asa-firewall
    site: NL
    capabilities:
      - tunnel-shutdown
      - shun-clear
      - bgp-peer
    access:
      method: ssh
      user: operator
      host: "10.0.181.X"
      key_algo: ssh-rsa

  - id: nl-sw01
    type: ios-switch
    site: NL
    capabilities:
      - port-shutdown
    access:
      method: ssh
      user: operator
      host: "10.0.181.X"
      ciphers: aes128-ctr
      notes: |
        L1 port shutdown on Gi1/0/36 simulates a Freedom ONT outage
        (the uplink port that carries PPPoE from the fibre ONT).
        Exercises the complete dual-WAN failover path: Budget PPPoE
        takes over within ~90s, BGP LP flips, VTI sessions re-form.

  - id: gr-fw01
    type: asa-firewall
    site: GR
    capabilities:
      - tunnel-shutdown
      - shun-clear
      - bgp-peer
    access:
      method: ssh-stepstone
      via: gr-pve01
      user: operator
      host: "10.0.X.X"

  - id: nl-dmz01
    type: proxmox-vm
    site: NL
    vmid: VMID_REDACTED
    capabilities:
      - nic-disconnect
      - container-stop
    access:
      method: ssh
      user: operator
      host: nl-dmz01

  - id: gr-dmz01
    type: proxmox-vm
    site: GR
    vmid: 201121301
    capabilities:
      - nic-disconnect
      - container-stop
    access:
      method: ssh
      user: operator
      host: gr-dmz01

  - id: notrf01vps01
    type: vps-strongswan
    site: "NO"
    capabilities:
      - swanctl-terminate
      - tc-netem
    access:
      method: ssh
      user: operator
      host: "198.51.100.X"
      key: ~/.ssh/one_key

  - id: chzrh01vps01
    type: vps-strongswan
    site: CH
    capabilities:
      - swanctl-terminate
      - tc-netem
    access:
      method: ssh
      user: operator
      host: "198.51.100.X"
      key: ~/.ssh/one_key

# Domain SLOs (referenced by experiments)
domain_slos:
  "kyriakos.papadopoulos.tech": {availability: 99.9, max_latency_ms: 500}
  "get.cubeos.app": {availability: 99.9, max_latency_ms: 500}
  "meshsat.net": {availability: 99.9, max_latency_ms: 500}
  "mulecube.com": {availability: 99.9, max_latency_ms: 500}
  "hub.meshsat.net": {availability: 99.5, max_latency_ms: 1000}

# Experiment definitions
experiments:
  # ---- Tunnel Failover (wan-failover category) ----

  - id: tunnel-nl-gr-freedom
    title: "NL-GR Freedom VTI Kill"
    description: "Shut down Tunnel4 (NL-GR Freedom), verify BGP failover to xs4all within 30s"
    category: wan-failover
    steady_state_hypothesis:
      title: "5 HTTP domains reachable, 22+ BGP peers established"
      probes:
        - {type: http, targets: ["kyriakos.papadopoulos.tech", "get.cubeos.app", "meshsat.net", "mulecube.com", "hub.meshsat.net"], tolerance: {min_ok: 5}}
        - {type: prometheus, query: "count(frr_bgp_peer_state{state='established'})", tolerance: {range: [20, 30]}}
        - {type: vti-ping, targets: ["10.255.200.X"], tolerance: {reachable: true}}
    method:
      - type: asa-tunnel-shutdown
        target: nl-fw01
        interface: Tunnel4
        tunnel_pair: ["NL \u2194 GR", "freedom"]
    rollbacks:
      - type: asa-tunnel-noshut
        target: nl-fw01
        interface: Tunnel4
    safety:
      requires_backup: [["NL \u2194 GR", "xs4all"]]
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      target_availability: 99.95
      max_convergence_seconds: 30
      max_mttd_seconds: 5
    schedule:
      frequency: weekly
      tier: primary
    runbook_ref: "docs/runbooks/tunnel-failover.md#nl-gr-freedom"

  - id: tunnel-nl-no-freedom
    title: "NL-NO Freedom VTI Kill"
    description: "Shut down Tunnel5, verify VPS NO transit via xs4all or GR relay"
    category: wan-failover
    steady_state_hypothesis:
      title: "HTTP reachable, BGP peers stable"
      probes:
        - {type: http, targets: ["kyriakos.papadopoulos.tech", "get.cubeos.app"], tolerance: {min_ok: 2}}
    method:
      - type: asa-tunnel-shutdown
        target: nl-fw01
        interface: Tunnel5
        tunnel_pair: ["NL \u2194 NO", "freedom"]
    rollbacks:
      - type: asa-tunnel-noshut
        target: nl-fw01
        interface: Tunnel5
    safety:
      requires_backup: []
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      max_convergence_seconds: 30
    schedule:
      frequency: monthly
      tier: secondary

  - id: tunnel-nl-ch-freedom
    title: "NL-CH Freedom VTI Kill"
    description: "Shut down Tunnel6, verify VPS CH transit via xs4all or GR relay"
    category: wan-failover
    method:
      - type: asa-tunnel-shutdown
        target: nl-fw01
        interface: Tunnel6
        tunnel_pair: ["NL \u2194 CH", "freedom"]
    rollbacks:
      - type: asa-tunnel-noshut
        target: nl-fw01
        interface: Tunnel6
    safety:
      requires_backup: []
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      max_convergence_seconds: 30
    schedule:
      frequency: monthly
      tier: secondary

  - id: tunnel-gr-no-inalan
    title: "GR-NO Inalan VTI Kill"
    description: "Shut down GR Tunnel2, verify transit via NL relay"
    category: wan-failover
    method:
      - type: asa-tunnel-shutdown
        target: gr-fw01
        interface: Tunnel2
        tunnel_pair: ["GR \u2194 NO", "inalan"]
    rollbacks:
      - type: asa-tunnel-noshut
        target: gr-fw01
        interface: Tunnel2
    safety:
      requires_backup: []
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      max_convergence_seconds: 45
    schedule:
      frequency: monthly
      tier: secondary

  - id: tunnel-gr-ch-inalan
    title: "GR-CH Inalan VTI Kill"
