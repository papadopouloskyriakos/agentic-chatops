  # ---- ISP-Level Degradation (tc netem) ----

  - id: wan-latency-freedom-200ms
    title: "Freedom WAN 200ms Latency Injection"
    description: "Inject 200ms+50ms jitter on Freedom VTI via tc netem on VPS"
    category: wan-degradation
    steady_state_hypothesis:
      title: "HTTP p95 latency < 500ms, BGP peers stable"
      probes:
        - {type: http, targets: ["kyriakos.papadopoulos.tech"], tolerance: {min_ok: 1}}
        - {type: prometheus, query: "count(frr_bgp_peer_state{state='established'})", tolerance: {range: [20, 30]}}
    method:
      - type: tc-netem
        target: notrf01vps01
        interface: xfrm-nl-f
        params: {delay_ms: 200, jitter_ms: 50}
    rollbacks:
      - type: tc-netem-clear
        target: notrf01vps01
        interface: xfrm-nl-f
    safety:
      max_duration: 300
      abort_threshold: {all_http_fail_seconds: 30}
    slo:
      max_latency_increase_pct: 100
    schedule:
      frequency: quarterly
      tier: tertiary
    runbook_ref: "docs/runbooks/isp-degradation-response.md"

  - id: wan-packetloss-freedom-10pct
    title: "Freedom WAN 10% Packet Loss Injection"
    description: "Inject 10% packet loss on Freedom VTI via tc netem on VPS"
    category: wan-degradation
    method:
      - type: tc-netem
        target: notrf01vps01
        interface: xfrm-nl-f
        params: {loss_percent: 10}
    rollbacks:
      - type: tc-netem-clear
        target: notrf01vps01
        interface: xfrm-nl-f
