  # ---- Multi-Fault (parallel branches) ----

  - id: combined-nl-gr-plus-dmz
    title: "NL-GR Tunnel + NL DMZ Kill (worst-case)"
    description: "Simultaneous tunnel kill and container stop using parallel branches"
    category: multi-fault
    method:
      steps:
        - name: "Inject network + container faults simultaneously"
          branches:
            - name: tunnel-kill
              actions:
                - type: asa-tunnel-shutdown
                  target: nl-fw01
                  interface: Tunnel4
                  tunnel_pair: ["NL \u2194 GR", "freedom"]
            - name: container-kill
              actions:
                - type: docker-compose-stop
                  target: nl-dmz01
                  services: [portfolio, cubeos-website, meshsat-website, mulecube]
    rollbacks:
      - type: asa-tunnel-noshut
        target: nl-fw01
        interface: Tunnel4
      - type: docker-compose-start
        target: nl-dmz01
        services: [portfolio, cubeos-website, meshsat-website, mulecube]
    safety:
      requires_backup: [["NL \u2194 GR", "xs4all"]]
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      max_convergence_seconds: 120
    schedule:
      frequency: semi-annually
      tier: game-day
    runbook_ref: "docs/runbooks/combined-failure-response.md"

  # ---- Site Isolation (annual game day) ----

  - id: site-isolation-gr
    title: "Full GR Site Isolation"
    description: "Kill all tunnels to GR (NL-GR + GR-NO + GR-CH), verify NL services unaffected"
    category: site-isolation
    method:
      steps:
        - name: "Isolate GR from mesh"
          branches:
            - name: nl-gr-tunnel
              actions:
                - type: asa-tunnel-shutdown
                  target: nl-fw01
                  interface: Tunnel4
                  tunnel_pair: ["NL \u2194 GR", "freedom"]
            - name: gr-no-tunnel
              actions:
                - type: asa-tunnel-shutdown
                  target: gr-fw01
                  interface: Tunnel2
                  tunnel_pair: ["GR \u2194 NO", "inalan"]
            - name: gr-ch-tunnel
              actions:
                - type: asa-tunnel-shutdown
                  target: gr-fw01
                  interface: Tunnel3
                  tunnel_pair: ["GR \u2194 CH", "inalan"]
    rollbacks:
      - {type: asa-tunnel-noshut, target: nl-fw01, interface: Tunnel4}
      - {type: asa-tunnel-noshut, target: gr-fw01, interface: Tunnel2}
      - {type: asa-tunnel-noshut, target: gr-fw01, interface: Tunnel3}
    safety:
      max_duration: 600
      abort_threshold: {all_http_fail_seconds: 60}
    slo:
      nl_services_unaffected: true
      max_convergence_seconds: 90
    schedule:
      frequency: annually
      tier: game-day
    runbook_ref: "docs/runbooks/combined-failure-response.md#site-isolation"

